# Service ClusterIP — expose le backend en interne dans le cluster uniquement.
# Les autres pods (frontend, ingress) accèdent à l'API via ce Service.
# ClusterIP est choisi car le backend ne doit pas être accessible de l'extérieur
# directement — seul l'Ingress expose les services au monde extérieur.
apiVersion: v1
kind: Service
metadata:
  name: vitalsync-backend-svc
  namespace: default
  labels:
    app: vitalsync-backend
spec:
  type: ClusterIP
  selector:
    # Sélectionne tous les pods avec ce label → load balancing automatique
    # entre les 2 réplicas du Deployment
    app: vitalsync-backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
