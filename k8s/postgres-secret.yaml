# Secret Kubernetes — stocke le mot de passe PostgreSQL encodé en base64.
# Les Secrets ne sont jamais en clair dans les manifestes : la valeur est
# encodée (base64) et injectée en mémoire dans le pod au démarrage.
# Pour générer : echo -n "VitalSync2026!" | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
data:
  # Valeur encodée en base64 (pas chiffrée — utiliser Sealed Secrets en prod)
  POSTGRES_PASSWORD: Vml0YWxTeW5jMjAyNiE=
