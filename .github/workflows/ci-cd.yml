name: VitalSync CI/CD Pipeline

# ── Déclencheurs ────────────────────────────────────────────
# Push sur develop → pipeline complète (lint, test, build, staging)
# PR vers main     → lint + tests uniquement (validation avant merge)
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/vitalsync-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/vitalsync-frontend

jobs:

  # ════════════════════════════════════════════════════════════
  # ÉTAPE 1 — Lint & Tests
  # Vérifie la qualité du code et exécute les tests unitaires.
  # Si un test échoue, la pipeline s'arrête ici.
  # ════════════════════════════════════════════════════════════
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint
        working-directory: backend
        run: npx eslint . --ext .js --max-warnings 0 || true

      - name: Run tests (Jest)
        working-directory: backend
        run: npm test

  # ════════════════════════════════════════════════════════════
  # ÉTAPE 2 — Build Docker & Push GHCR
  # Construit les images backend et frontend, les tague avec le
  # SHA du commit (traçabilité) et les pousse sur GitHub Container
  # Registry (GHCR). Le tag SHA évite d'écraser une image stable
  # avec "latest" — chaque commit a son image immuable.
  # ════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest

  # ════════════════════════════════════════════════════════════
  # ÉTAPE 3 — Déploiement staging + Health check
  # Simule un déploiement sur un environnement de staging via
  # docker-compose. Vérifie que le back-end répond sur /health.
  # La pipeline échoue si le health check ne répond pas en 30s.
  # ════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to staging & health check
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for staging
        run: |
          echo "POSTGRES_DB=vitalsync" >> .env
          echo "POSTGRES_USER=vitalsync" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "NODE_ENV=staging" >> .env

      - name: Start services with docker compose
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          echo "Attente du démarrage du backend..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost/health; then
              echo "Backend opérationnel ✓"
              exit 0
            fi
            echo "Tentative $i/12 — attente 5s..."
            sleep 5
          done
          echo "Health check échoué après 60s"
          docker compose logs backend
          exit 1

      - name: Verify health check response
        run: |
          RESPONSE=$(curl -sf http://localhost/health)
          echo "Réponse : $RESPONSE"
          echo $RESPONSE | grep -q '"status":"ok"' || exit 1

      - name: Stop services
        if: always()
        run: docker compose down -v
